<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日程生成ツール</title>

    <style>
        body {
            font-family: sans-serif;
            padding: 0 20px;
            line-height: 1.6;
            font-size: 16px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: stretch;
            margin-bottom: 24px;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        input,
        button {
            padding: 8px;
            margin: 6px 0;
            font-size: 16px;
        }

        button {
            cursor: pointer;
        }

        pre {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        .error {
            color: red;
            font-weight: bold;
        }

        .container {
            max-width: 720px;
            margin: 40px auto;
        }

        .description {
            color: #555;
        }

        .card {
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .copy-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            form {
                flex-direction: column;
                align-items: stretch;
            }
        }

        .tool-grid {
            display: flex;
            gap: 20px;
        }

        .tool-grid .card {
            flex: 1;
        }

        @media (max-width: 600px) {
            .tool-grid {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <h1>日程調整サポートツール</h1>
        <p class="description">調整さん用の日程候補生成や、CSV集計を行えるツールです。</p>

        <div class="tool-grid">
            <section class="card">
                <h2>日程生成</h2>
                <form method="post">
                    <div class="form-row">
                        <label>開始日:</label>
                        <input type="date" name="start_date" value="{{ start_date }}" required>
                    </div>

                    <div class="form-row">
                        <label>終了日:</label>
                        <input type="date" name="end_date" value="{{ end_date }}" required>
                    </div>

                    <button type="submit">生成</button>
                </form>

                {% if schedule_error %}
                <p class="error">{{ schedule_error }}</p>
                {% endif %}
            </section>

            <section class="card">
                <h2>CSV集計</h2>
                <form method="post" enctype="multipart/form-data">
                    <div class="form-row">
                        <label>CSVファイル:</label>
                        <input type="file" name="csv_file" accept=".csv">
                    </div>
                    最低参加人数: <input type="number" name="min_count" value="{{ min_count }}" min="1">
                    <button type="submit">集計</button>
                </form>

                {% if csv_error %}
                <p class="error">{{ csv_error }}</p>
                {% endif %}
            </section>
        </div>

        {% if schedule_result %}
        <section class="card">
            <h2>生成結果</h2>

            <div class="copy-area">
                <button onclick="copyText('schedule-result', 'schedule-copy-message')">
                    コピー
                </button>
                <span id="schedule-copy-message"></span>
            </div>

            <pre id="schedule-result">{{ schedule_result }}</pre>
        </section>
        {% endif %}

        {% if csv_result %}
        <section class="card">
            <h2>集計結果</h2>

            <div class="copy-area">
                <button onclick="copyText('csv-result', 'csv-copy-message')">
                    コピー
                </button>

                <span id="csv-copy-message"></span>
            </div>

            <pre id="csv-result">{{ csv_result }}</pre>
        </section>
        {% endif %}

        <script>
            function copyText(resultId, messageId) {
                const text = document.getElementById(resultId).innerText;

                navigator.clipboard.writeText(text)
                    .then(() => {
                        document.getElementById(messageId).innerText = "コピーしました。";

                        setTimeout(() => {
                            document.getElementById(messageId).innerText = "";
                        }, 2000);
                    })
                    .catch(() => {
                        document.getElementById(messageId).innerText = "コピーに失敗しました。";

                        setTimeout(() => {
                            document.getElementById(messageId).innerText = "";
                        }, 2000);
                    });
            }
        </script>
    </main>
</body>

</html>
